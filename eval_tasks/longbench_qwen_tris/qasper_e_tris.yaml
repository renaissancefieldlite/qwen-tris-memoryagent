tag:
  - qwen_tris_custom_tasks
task: qwen_tris_qasper_e
dataset_path: Xnhyacinth/LongBench
test_split: test
dataset_name: qasper_e
doc_to_text: "Qwen Tris public benchmark discipline: use only the article; return the shortest complete answer span that satisfies the question. If the question asks for a dataset, corpus, size, count, performance, results, languages, baselines, methods, or a definition of what something is, preserve the required numbers, units, codes, parenthetical labels, list items, and defining clause from the article. Do not collapse a dataset or method answer to only a generic name when the question asks what it is, how big it is, what it contains, or which items are included. If the question asks only for a specific name, label, acronym, yes/no, or unanswerable status, answer only that exact item. Do not add commentary.\n\nYou are given a scientific article and a question. Answer the question as concisely as you can, using a single phrase or sentence if possible. If the question cannot be answered based on the information in the article, write \"unanswerable\". If the question is a yes/no question, answer \"yes\", \"no\", or \"unanswerable\". Do not provide any explanation.\n\nArticle: {{context}}\n\n Answer the question based on the above article as concisely as you can, using a single phrase or sentence if possible. If the question cannot be answered based on the information in the article, write \"unanswerable\". If the question is a yes/no question, answer \"yes\", \"no\", or \"unanswerable\". Do not provide any explanation.\n\nQuestion: {{question}}\n\nAnswer:"
doc_to_target: '{{answers}}'
process_results: !function metrics.get_qa_f1_with_score
generation_kwargs:
  max_gen_toks: 128
  temperature: 1
  do_sample: False
  until: []
metric_list:
  - metric: "score"
    aggregation: mean
    higher_is_better: True
  - metric: "qa_f1_score"
    aggregation: mean
    higher_is_better: True
metadata:
  version: 1.0
  base_task: longbench_qasper_e
  prompt_variant: qwen_tris_repaired_qasper_answer_discipline
